<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI QA Assistant</title>

  <link rel="stylesheet" href="css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>
  <div class="app d-flex">
    <aside class="sidebar d-flex flex-column">
      <div class="brand">
        <span class="badge text-bg-primary mb-3">AI QA Tool</span>
        <h1>AI QA Assistant</h1>
        <p>QA workspace for test cases, bug reports, edge cases, and checklists.</p>
      </div>

      <button id="new-chat-btn" class="btn btn-primary w-100 mt-3">
        + New Chat
      </button>

      <div class="sidebar-section">
        <div class="sidebar-title">Recent Chats</div>
        <div id="chat-list" class="chat-list"></div>
      </div>
    </aside>

    <main class="chat-layout flex-grow-1 d-flex flex-column">
      <header class="chat-topbar d-flex align-items-center justify-content-between">
        <div>
          <h2 class="h5 fw-bold mb-1">QA Chat</h2>
          <p class="small text-secondary mb-0">Describe a feature, bug, or user story.</p>
        </div>

        <div class="d-flex align-items-center gap-2">
          <button id="theme-toggle" class="theme-btn" type="button">
            Dark
          </button>
          <select id="qa-mode" class="form-select form-select-sm">
            <option value="general">General QA</option>
            <option value="test_cases">Test Cases</option>
            <option value="bug_report">Bug Report</option>
            <option value="edge_cases">Edge Cases</option>
            <option value="checklist">QA Checklist</option>
            <option value="screenshot_review">Screenshot Review</option>
          </select>
          <span class="status">Online</span>
        </div>
      </header>


      <section id="chat-area" class="chat-area flex-grow-1"></section>

      <form id="chat-form" class="chat-form">
        <div id="composer" class="composer">
          <div id="attachment-preview" class="attachment-preview d-none"></div>

          <div class="composer-row">
            <div class="dropup">
              <button
                id="attach-menu-btn"
                class="composer-icon-btn"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                aria-label="Attach file"
              >
                +
              </button>

              <ul class="dropdown-menu composer-menu">
                <li>
                  <label class="dropdown-item" for="screenshot-input">
                    Upload image
                  </label>
                </li>
                <li>
                  <button class="dropdown-item disabled" type="button" disabled>
                    Upload document soon
                  </button>
                </li>
              </ul>
            </div>

            <textarea
              id="message"
              class="composer-textarea"
              rows="1"
              placeholder="Ask about QA testing..."
              autocomplete="off"
            ></textarea>

            <button id="send" class="composer-send-btn" type="submit" aria-label="Send message">
              ↑
            </button>
          </div>

          <input
            id="screenshot-input"
            type="file"
            accept="image/png,image/jpeg,image/webp"
            hidden
          />
        </div>
      </form>

      <div class="modal fade" id="deleteChatModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content app-modal">
            <div class="modal-header">
              <h5 class="modal-title">Delete chat?</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
              <p class="mb-0">
                This action cannot be undone. Are you sure you want to delete this chat?
              </p>
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                Cancel
              </button>
              <button id="confirm-delete-chat" type="button" class="btn btn-danger">
                Delete
              </button>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/main.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
